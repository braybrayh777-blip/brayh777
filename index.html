<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Game Hub</title>
    <style>
        body { font-family: Arial; text-align: center; background: #0a0a0a; color: #0f0; margin: 0; padding: 20px; }
        h1 { color: yellow; }
        .container { max-width: 1200px; margin: 0 auto; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 25px; margin: 30px 0; }
        .game-card { background: #111; padding: 15px; border: 2px solid #0f0; border-radius: 10px; box-shadow: 0 0 15px rgba(0,255,0,0.25); transition: all 0.2s; cursor: pointer; }
        .game-card:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(0,255,0,0.5); }
        .game-card img { width: 100%; height: auto; border-radius: 6px; border: 1px solid #0f0; background: #000; }
        .game-card h3 { margin: 10px 0 5px; font-size: 1.1em; color: #ffff99; }
        #game-container { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 100; padding: 10px; overflow: auto; }
        #emulator { width: 100%; height: 80vh; border: 4px solid #0f0; background: #000; }
        .back-btn { padding: 12px 30px; background: #0f0; color: #000; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; margin: 10px; }
        .back-btn:hover { background: #ffff00; }
        #status { color: #ff0; font-size: 1.2em; margin: 10px; text-align: center; }
    </style>
</head>
<body>
    <div id="hub">
        <h1>Pokémon Game Hub</h1>
        <div class="games-grid">
            <!-- Pokémon Light Platinum (GBA) -->
            <div class="game-card" onclick="loadGame('mgba', '/brayh777/roms/pokemon-light-platinum.txt', 'Pokémon Light Platinum (GBA)')">
                <img src="https://archives.bulbagarden.net/media/upload/7/7e/Light_Platinum_cover.jpg" alt="Light Platinum">
                <h3>Pokémon Light Platinum (GBA)</h3>
            </div>

            <!-- Pokémon Emerald Omega (GBA) -->
            <div class="game-card" onclick="loadGame('mgba', '/brayh777/roms/emerald-omega.txt', 'Pokémon Emerald Omega')">
                <img src="https://archives.bulbagarden.net/media/upload/3/3c/Emerald_EN_boxart.jpg" alt="Emerald Omega">
                <h3>Pokémon Emerald Omega (GBA)</h3>
            </div>

            <!-- Pokémon Renegade Platinum (NDS) -->
            <div class="game-card" onclick="loadGame('melonDS', '/brayh777/roms/renegade-platinum.txt', 'Pokémon Renegade Platinum')">
                <img src="https://archives.bulbagarden.net/media/upload/4/4b/Platinum_EN_boxart.jpg" alt="Renegade Platinum">
                <h3>Pokémon Renegade Platinum (NDS)</h3>
            </div>
        </div>
    </div>

    <div id="game-container">
        <button onclick="closeGame()" class="back-btn">← Back</button>
        <div id="emulator"></div>
        <div id="status">Loading emulator...</div>
        <button onclick="closeGame()" class="back-btn">← Back</button>
    </div>

<script>
    function loadGame(core, romPath, gameName) {
        document.getElementById('hub').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        const status = document.getElementById('status');
        status.innerHTML = 'Loading emulator & ROM... (may take 30–90 seconds first time)';

        window.EJS_player = '#emulator';
        window.EJS_core = core;
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_gameUrl = romPath;
        window.EJS_gameName = gameName;
        window.EJS_startOnLoaded = true;
        window.EJS_threads = false;
        window.EJS_language = 'en-US';

        console.log('Starting emulator with ROM:', romPath);

        const s = document.createElement('script');
        s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
        s.onload = () => {
            console.log('CDN Loader loaded – emulator initializing');
            status.innerHTML = 'Emulator ready - booting game...';
        };
        s.onerror = () => {
            console.error('Failed to load CDN loader');
            status.innerHTML = 'Failed to load emulator - check console';
        };
        document.body.appendChild(s);
    }

    function closeGame() {
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('hub').style.display = 'block';
        document.getElementById('emulator').innerHTML = '';
    }
</script>
</body>
</html>
